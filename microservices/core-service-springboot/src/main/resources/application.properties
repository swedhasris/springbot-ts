spring.application.name=ticklora-core
server.port=3000

# ── Screen Capture ─────────────────────────────────────────────────────
# Disable headless mode so java.awt.Robot can capture the screen.
# Spring Boot defaults to headless=true which blocks AWT screen capture.
spring.main.headless=false

# ── MySQL ─────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:connectit_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Connection Pool (HikariCP) ─────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ── JPA ───────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ConnectIT_2026_Secure_JWT_Key_987654321_minimum_32_characters}
jwt.expiration=86400000

# ── CORS — allow the React frontend ───────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost

# ── File upload ───────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=${UPLOAD_DIR:./public/uploads}

# ── Email (M365) ───────────────────────────────────────────────────────
spring.mail.host=${SMTP_HOST:smtp.office365.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:support@technosprint.net}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.office365.com
app.mail.from=${MAIL_FROM:support@technosprint.net}
app.mail.from-name=${MAIL_FROM_NAME:Technosprint Support}

# ── Gemini AI ──────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# ── Microsoft Graph ────────────────────────────────────────────────────
graph.tenant-id=${GRAPH_TENANT_ID:}
graph.client-id=${GRAPH_CLIENT_ID:}
graph.client-secret=${GRAPH_CLIENT_SECRET:}
graph.user-email=${GRAPH_USER_EMAIL:support@technosprint.net}

# ── SLA cron schedules ─────────────────────────────────────────────────
sla.escalation.cron=0 */15 * * * *
sla.breach.monitor.cron=0 0 * * * *

# ── Actuator ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────────────────
logging.level.com.connectit=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
