spring.application.name=ticklora-core
server.port=3000

# ── Screen Capture ─────────────────────────────────────────────────────
# Disable headless mode so java.awt.Robot can capture the screen.
# Spring Boot defaults to headless=true which blocks AWT screen capture.
spring.main.headless=false

# ── Database — PostgreSQL on Render, MySQL for local dev ──────────────
# When DATABASE_URL is set (Render PostgreSQL), use it. Otherwise use MySQL.
spring.datasource.url=${DATABASE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:connectit_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:${MYSQL_USER:root}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:}}
# Driver is auto-detected from the URL (postgresql:// or mysql://)

# ── Connection Pool (HikariCP) ─────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ── JPA ───────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
# Disable MySQL-specific dialect — let Hibernate auto-detect from URL
spring.jpa.database-platform=
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.open-in-view=false

# ── HTTP Response Compression (Gzip) ──────────────────────────────────
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# ── JWT ───────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:ConnectIT_2026_Secure_JWT_Key_987654321_minimum_32_characters}
jwt.expiration=86400000

# ── CORS — allow the React frontend ───────────────────────────────────
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost,https://tech-nllq.onrender.com,https://*.onrender.com

# ── File upload ───────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=${UPLOAD_DIR:./public/uploads}

# ── Email (SMTP Configuration) ───────────────────────────────────────────
# Default: Microsoft 365 SMTP (smtp.office365.com:587) with info@technosprint.net
# To use Brevo instead, set: EMAIL_HOST=smtp-relay.brevo.com EMAIL_PORT=587
#           EMAIL_USER=your_brevo_login EMAIL_PASSWORD=your_brevo_smtp_key
#
# For M365: Ensure SMTP AUTH is enabled per mailbox in M365 Admin Center
# M365 Admin > Users > Active Users > info@technosprint.net > Mail > Manage email apps > Enable SMTP AUTH
spring.mail.host=${EMAIL_HOST:${SMTP_HOST:smtp.office365.com}}
spring.mail.port=${EMAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${EMAIL_USER:${SMTP_USER:info@technosprint.net}}
spring.mail.password=${EMAIL_PASSWORD:${SMTP_PASS:Poland@01}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
spring.mail.properties.mail.debug=false
app.mail.from=${EMAIL_FROM:${MAIL_FROM:info@technosprint.net}}
app.mail.from-name=${MAIL_FROM_NAME:Manage My Desk}

# ── Inbound IMAP Settings ──────────────────────────────────────────────
app.imap.host=${IMAP_HOST:outlook.office365.com}
app.imap.port=${IMAP_PORT:993}
app.imap.user=${IMAP_USER:info@technosprint.net}
app.imap.pass=${IMAP_PASS:Poland@01}

# Disable flyway
spring.flyway.enabled=false

# ── Gemini AI ──────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=gemini-2.5-flash

# ── Microsoft Graph ────────────────────────────────────────────────────
graph.tenant-id=${GRAPH_TENANT_ID:}
graph.client-id=${GRAPH_CLIENT_ID:}
graph.client-secret=${GRAPH_CLIENT_SECRET:}
graph.user-email=${GRAPH_USER_EMAIL:info@technosprint.net}

# ── SLA cron schedules ─────────────────────────────────────────────────
sla.escalation.cron=0 */15 * * * *
sla.breach.monitor.cron=0 0 * * * *

# ── Actuator ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ───────────────────────────────────────────────────────────
logging.level.com.connectit=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
