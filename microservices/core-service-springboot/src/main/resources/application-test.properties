# Test profile — uses H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.mail.host=${EMAIL_HOST:${SMTP_HOST:smtp.office365.com}}
spring.mail.port=${EMAIL_PORT:${SMTP_PORT:587}}
spring.mail.username=${EMAIL_USER:${SMTP_USER:info@technosprint.net}}
spring.mail.password=${EMAIL_PASSWORD:${SMTP_PASS:Poland@01}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
logging.level.root=WARN
